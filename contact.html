    <meta charset="utf-8">

    <title>Terrace View Technologies</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<body>
    <div class="nav" id="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="javascript:void(0);" class="icon" onclick="myFunction()">
            <i class="fa fa-bars"></i>
        </a>
    </div>
    <h1 style="text-align: center; color: white;">Contact Us!</h1>
    <div class="grid-contact">
        <div class="contact-form">
            <div class="form-container">
                <form name="contact" action="https://formsubmit.co/contact@terraceviewtechnologies.com" method="POST">

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name..">

                    <label for="Email">Email</label>
                    <input type="text" id="Email" name="Email" placeholder="Best email to reach you..">

                    <label for="Message">Message</label>
                    <textarea id="Message" name="Message" placeholder="Tell us about your project!"
                        style="height:200px"></textarea>

                    <input type="submit" value="Submit">

                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
